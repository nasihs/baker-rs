[project]
name = "baker_demo"
default = "merge_test"

[env.output]
dir = "release"

[env.version]
source = "header"
file = "version.h"
# Either 'string' OR (major+minor+patch) is required
# 'string' supports v prefix (e.g., "v1.2.3")
build = "BUILD_NUMBER" # Macro BUILD_NUMBER defined in version.h
string = "VERSION_STR" # optional, Macro VERSION_STR defined in version.h

[bootloaders.default]
file = "build/bt.hex"
base_addr = 0x0800_0000
app_offset = 0x8000

# custom header definiton
[headers.custom_fpk]
suffix = "fpk"
def = """
@endian = little;

struct header @packed {
    magic:          [u8; 4] = @bytes("fpk");
    config:         u32 = 0;
    old_version:    [u8; 16];
    new_version:    [u8; 16] = [${VERSION_MAJOR}, ${VERSION_MINOR}, ${VERSION_PATCH}];
    watermark:      [u8; 16] = @bytes("baker");
    partition:      [u8; 16] = @bytes("app");
    img_size:       u32 = @sizeof(image);
    packed_size:    u32 = @sizeof(image);
    timestamp:      u32 = ${UNIX_TIMESTAMP};
    img_crc32:      u32 = @crc32(image);
    packed_crc32:   u32 = @crc32(image);
    header_crc32:   u32 = @crc32(@self[..header_crc32]);
    _padding:       [u8; 1024 - @offsetof(_padding)];
}
"""

[targets.merge_test]
type = "merge"
description = "Merge bootloader and app"
bootloader = "default"
app_file = "build/app.hex"
output_format = "hex"  # use bin if not specified
output_name = "{PROJECT}_v{VERSION}_build.{BUILD}_{DATE}"

[targets.pack_bin]
type = "pack"
description = "Pack with custom header"
header = "custom_fpk"  # use custom header
app_file = "build/app.bin"
app_offset = 0x8000  # needed if app is binary
output_name = "{PROJECT}_v{VERSION}"

[targets.convert_bin]
type = "convert"
description = "Convert hex to bin"
input_file = "build/app.hex"
output_format = "bin"
output_name = "converted_bin"

[targets.convert_srec]
type = "convert"
description = "Convert to S-record format"
input_file = "build/app.hex"
output_format = "srec"
output_name = "converted_srec"