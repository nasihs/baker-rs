[project]
name = "my_firmware"
default = "release"

[env.output]
dir = "release"

[env.version]
source = "file"
file = "version.h"
template = """
#define VERSION_MAJOR  ${MAJOR}
#define VERSION_MINOR  ${MINOR}
#define VERSION_PATCH  ${PATCH}
#define BUILD_NUMBER   ${BUILD}
"""

[bootloaders.default]
file = "build/bootloader.hex"
base_addr = 0x0800_0000
app_offset = 0x8000

[targets.release]
type = "merge"
description = "Merge bootloader and application"
bootloader = "default"
app_file = "build/app.hex"
output_format = "hex"
output_name = "${PROJECT}_v${VER.MAJOR}.${VER.MINOR}.${VER.PATCH}_build${VER.BUILD}_${TIME.YYYYMMDD}"
